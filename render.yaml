# Render Blueprint — one-click deploy of the API + Postgres + Redis.
# In Render: New → Blueprint → connect the repo containing this file.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: outflow-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
      # Secret/config — set these in the Render dashboard (sync:false = not in git):
      - key: API_KEYS
        sync: false
      - key: CORS_ORIGINS
        sync: false        # e.g. https://your-frontend-domain.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: INSTANTLY_API_KEY
        sync: false
      - key: INSTANTLY_CAMPAIGN_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_TWIML_URL
        sync: false
      # Wired automatically from the managed services below:
      - key: DATABASE_URL
        fromDatabase:
          name: outflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: outflow-redis
          property: connectionString

  # Redis (used later for the job queue / distributed rate limiting).
  - type: redis
    name: outflow-redis
    plan: starter
    ipAllowList: []        # only reachable from your Render services

databases:
  - name: outflow-db
    plan: basic-256mb
    postgresMajorVersion: "16"
